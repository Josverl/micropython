name: 'PR Status Comment'
description: >
  Creates or updates a single PR conversation comment per category.
  Uses a hidden marker to identify the comment, minimizes on pass and
  unminimizes on error so the PR conversation stays clean.

inputs:
  status:
    description: >
      Status value: "error" or "passed" (case-insensitive).
      When "error", the comment is created (if absent) or updated and unminimized.
      When "passed", an existing comment is updated and minimized; no new comment
      is created.
    required: true
  category:
    description: >
      Label that identifies which comment to manage. Defaults to the name of the
      calling workflow (github.workflow). One comment per category is kept.
    required: false
    default: ''
  description:
    description: >
      Optional markdown text appended to the comment body after the status
      heading. Use a multi-line YAML block scalar for multi-line content.
    required: false
    default: ''
  token:
    description: >
      GitHub token used for all API calls. Defaults to the job's GITHUB_TOKEN.
      The calling job must grant at least "issues: write" permission (PRs are
      issues for the comment REST API) and "pull-requests: write" for GraphQL
      minimize/unminimize mutations.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Create or update PR status comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_CATEGORY: ${{ inputs.category }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        _WORKFLOW_NAME: ${{ github.workflow }}
        _EVENT_NAME: ${{ github.event_name }}
        _REPO: ${{ github.repository }}
      run: ${{ github.action_path }}/comment.sh
