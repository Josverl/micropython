name: Publish mpremote branch packages to Pages

on:
  push:
    branches:
      - "*mpremote*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "mpremote-pages-simple-index-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build hatchling hatch-vcs

      - name: Build mpremote (wheel + sdist)
        working-directory: tools/mpremote
        run: |
          set -eux
          rm -rf dist
          python -m build

      - name: Prepare gh-pages worktree (robust)
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin --prune

          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            # Branch exists on remote: add worktree from it
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            # Branch does not exist: create it as an orphan branch in a detached worktree,
            # then push it explicitly to origin.
            git worktree add gh-pages-worktree --detach
            pushd gh-pages-worktree
            git checkout --orphan gh-pages
            rm -rf ./* ./.??* || true
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize gh-pages"
            git push origin HEAD:refs/heads/gh-pages
            popd

            # Re-attach the worktree to the remote branch (keeps refs clean)
            git worktree remove --force gh-pages-worktree
            git fetch origin gh-pages
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          fi

      - name: Publish artifacts into branch-scoped simple index (keep last 10)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -eux

          DEST="gh-pages-worktree/simple/${BRANCH}/mpremote"
          mkdir -p "${DEST}"

          cp -v tools/mpremote/dist/* "${DEST}/"

          python - <<'PY'
          import os
          import re
          from collections import defaultdict
          from pathlib import Path

          branch = os.environ["BRANCH"]
          dest = Path("gh-pages-worktree") / "simple" / branch / "mpremote"
          keep_versions = 10

          files = [p for p in dest.iterdir() if p.is_file() and p.name != "index.html"]

          rx = re.compile(r"^mpremote-(?P<ver>.+?)(?:-py.+\.whl|\.tar\.gz)$")

          groups = defaultdict(list)
          for p in files:
              m = rx.match(p.name)
              if not m:
                  continue
              groups[m.group("ver")].append(p)

          ranked = []
          for ver, ps in groups.items():
              newest = max(p.stat().st_mtime for p in ps)
              ranked.append((newest, ver))
          ranked.sort(reverse=True)

          keep_set = set(ver for _, ver in ranked[:keep_versions])

          for ver, ps in groups.items():
              if ver in keep_set:
                  continue
              for p in ps:
                  p.unlink(missing_ok=True)

          kept_files = sorted([p.name for p in dest.iterdir() if p.is_file() and p.name != "index.html"])

          def esc(s: str) -> str:
              return (
                  s.replace("&", "&amp;")
                   .replace("<", "&lt;")
                   .replace(">", "&gt;")
                   .replace('"', "&quot;")
              )

          links = "\n".join(f'<a href="{esc(n)}">{esc(n)}</a><br>' for n in kept_files)
          (dest / "index.html").write_text(f"<html><body>\n{links}\n</body></html>\n", encoding="utf-8")

          root = dest.parent
          (root / "index.html").write_text(
              '<html><body>\n<a href="mpremote/">mpremote</a><br>\n</body></html>\n',
              encoding="utf-8",
          )
          PY

      - name: Commit and push gh-pages (only Pages content)
        run: |
          set -eux
          pushd gh-pages-worktree

          test -f .nojekyll || touch .nojekyll

          git add .nojekyll simple/

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Publish mpremote simple index for ${{ github.ref_name }} @ ${{ github.sha }}"
          git push origin HEAD:gh-pages
          popd
