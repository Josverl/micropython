name: Check spelling with codespell

on: [push, pull_request]

jobs:
  codespell:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
    # codespell version should be kept in sync with .pre-commit-config.yml
    - run: pip install --user codespell==2.4.1 tomli
    - run: codespell
    # additionally check for misspelling of "MicroPython"
    - run: |
        if git grep -n Micropython -- ":(exclude).github/workflows/codespell.yml"; then
            echo "Please correct capitalisation of MicroPython on the above lines"
            exit 1
        fi
    - name: Report failure
      if: failure() && github.event_name == 'pull_request'
      uses: ./.github/actions/pr-status-comment
      with:
        status: error
        category: codespell
        description: |
          Spell checking failed. Run `codespell` locally and fix the reported issues.
          [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
    - name: Report success
      if: success() && github.event_name == 'pull_request'
      uses: ./.github/actions/pr-status-comment
      with:
        status: passed
        category: codespell
