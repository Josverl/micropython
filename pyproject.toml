[tool.codespell]
count = ""
ignore-regex = '\b[A-Z]{3}\b'
ignore-words-list = "ans,asend,deques,dout,emac,extint,hsi,iput,mis,notin,numer,ser,shft,synopsys,technic,ure,curren"
quiet-level = 3
skip = """
*/build*,\
./.git,\
./drivers/cc3100,\
./lib,\
./ports/cc3200/FreeRTOS,\
./ports/cc3200/bootmgr/sl,\
./ports/cc3200/hal,\
./ports/cc3200/simplelink,\
./ports/cc3200/telnet,\
./ports/esp32/managed_components,\
./ports/nrf/drivers/bluetooth/s1*,\
./ports/stm32/usbhost,\
./tests,\
ACKNOWLEDGEMENTS,\
"""

[tool.ruff]
# Exclude third-party code from linting and formatting
extend-exclude = [
  "lib",
  "esp-idf",
  "pico-sdk",
  "emsdk",
  "tests/cpydiff/syntax_assign_expr.py" # intentionally incorrect CPython code
]
# Include Python source files that don't end with .py
extend-include = ["tools/cc1"]
line-length = 99
target-version = "py38"

[tool.ruff.lint]
exclude = [  # Ruff finds Python SyntaxError in these files
  "tests/cmdline/cmd_compile_only_error.py",
  "tests/cmdline/repl_autocomplete.py",
  "tests/cmdline/repl_autocomplete_underscore.py",
  "tests/cmdline/repl_autoindent.py",
  "tests/cmdline/repl_basic.py",
  "tests/cmdline/repl_cont.py",
  "tests/cmdline/repl_emacs_keys.py",
  "tests/cmdline/repl_paste.py",
  "tests/cmdline/repl_words_move.py",
  "tests/feature_check/repl_emacs_check.py",
  "tests/feature_check/repl_words_move_check.py",
  "tests/micropython/viper_args.py",
]
extend-select = ["C9", "PLC"]
ignore = [
  "E401",
  "E402",
  "E722",
  "E731",
  "E741",
  "F401",
  "F403",
  "F405",
  "F821",
  "PLC1901",
]
line-length = 337
target-version = "py37"

[tool.ruff.mccabe]
max-complexity = 40

[tool.ruff.lint.per-file-ignores]
# Exclude all tests from linting.
"tests/**/*.py" = ["ALL"]
"ports/cc3200/tools/uniflash.py" = ["E711"]


[tool.pytest.ini_options]
# https://docs.pytest.org/en/stable/reference/reference.html#ini-options-ref
# --cov: enable coverage (source is set in [tool.coverage.run])
# --cov-context=test: each test gets its own context for scenario tracking
# --cov-append: append to existing coverage data (for combining with bash tests)
addopts = "--cov --cov-context=test --cov-append --cov-report=term"
testpaths = [
    "tools/mpremote/tests",
]

[tool.coverage.run]
# parallel = true enables collection of coverage from subprocesses
# This is for coverage data collection, not pytest parallelization
parallel = true
source = ["mpremote"]
branch = true

[tool.coverage.report]
show_missing = true

[tool.coverage.html]
# Show contexts in HTML report - see which scenarios covered each line
show_contexts = true

[tool.coverage.json]
# Include contexts in JSON report for programmatic analysis
show_contexts = true
